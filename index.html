<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe de Coordinacion - Victoria Pineda Administraciones</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--p:#1b5e38;--pl:#2e7d52;--ac:#4caf76;--as:#a8d5b8;--bg:#f0f7f3;--ca:#fff;--bo:#c6ddd0;--tx:#1a2e23;--ts:#4a6b56;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);}
.ah{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;}
.ht{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;flex-wrap:wrap;gap:12px;}
.br{display:flex;align-items:center;gap:12px;}
.lw{width:52px;height:52px;background:rgba(255,255,255,.95);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.lw img{width:100%;height:100%;object-fit:contain;}
.bt h1{font-size:17px;font-weight:700;}
.bt p{font-size:11px;opacity:.75;margin-top:2px;}
.ha{display:flex;gap:8px;flex-wrap:wrap;}
.bh{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;}
.bh:hover{background:rgba(255,255,255,.22);}
.bh.gr{background:var(--ac);border-color:var(--ac);}
.mb{background:rgba(0,0,0,.2);padding:10px 24px;display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end;}
.mf{display:flex;flex-direction:column;gap:3px;}
.mf label{opacity:.7;font-size:10px;text-transform:uppercase;letter-spacing:.6px;}
.mf input,.mf select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 10px;border-radius:6px;font-size:13px;outline:none;font-family:inherit;}
.mf input::placeholder{color:rgba(255,255,255,.45);}
.tt{display:flex;gap:4px;background:rgba(0,0,0,.22);border-radius:8px;padding:4px;}
.tb{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;color:rgba(255,255,255,.65);background:transparent;}
.tb.on{background:#fff;color:var(--p);}
.mn{max-width:1200px;margin:0 auto;padding:24px 16px 40px;}
.db{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:22px;}
.dc{background:var(--ca);border-radius:12px;padding:14px 12px;border:1px solid var(--bo);text-align:center;cursor:pointer;transition:transform .15s;}
.dc:hover{transform:translateY(-2px);}
.dc .ic{font-size:22px;margin-bottom:5px;}
.dc .lb{font-size:11px;color:var(--ts);font-weight:600;line-height:1.3;}
.dc .sd{width:10px;height:10px;border-radius:50%;margin:7px auto 0;background:#d1d5db;}
.dc.ok .sd{background:#16a34a;} .dc.warn .sd{background:#ca8a04;}
.dc.alert .sd{background:#ea580c;} .dc.critical .sd{background:#dc2626;}
.sg{display:flex;flex-direction:column;gap:14px;}
.sc{background:var(--ca);border-radius:14px;border:1px solid var(--bo);overflow:hidden;}
.sh{display:flex;align-items:center;padding:14px 18px;cursor:pointer;user-select:none;gap:12px;background:#f4faf6;border-bottom:1px solid var(--bo);}
.sn{font-size:11px;font-weight:800;color:var(--p);background:var(--as);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.si{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sw{flex:1;min-width:0;}
.st{font-size:15px;font-weight:700;color:var(--p);}
.ss{font-size:11px;color:var(--ts);margin-top:1px;}
.badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;}
.ok{background:#dcfce7;color:#15803d;} .warn{background:#fef9c3;color:#a16207;}
.alert{background:#ffedd5;color:#c2410c;} .critical{background:#fee2e2;color:#b91c1c;}
.na{background:#f1f5f9;color:#64748b;}
.cv{font-size:11px;color:var(--ts);transition:transform .2s;margin-left:4px;}
.cv.op{transform:rotate(90deg);}
.sb{padding:0 18px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;}
.sb.op{max-height:9999px;padding:18px;}
.sui{display:flex;flex-direction:column;gap:12px;}
.su{background:#f4faf6;border:1px solid var(--bo);border-radius:10px;padding:13px;}
.suh{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sut{font-size:13px;font-weight:600;flex:1;color:var(--p);}
select.ss2{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;border:none;cursor:pointer;outline:none;}
select.ss2.ok{background:#dcfce7;color:#15803d;} select.ss2.warn{background:#fef9c3;color:#a16207;}
select.ss2.alert{background:#ffedd5;color:#c2410c;} select.ss2.critical{background:#fee2e2;color:#b91c1c;}
select.ss2.na{background:#f1f5f9;color:#64748b;}
textarea.nt{width:100%;border:1px solid var(--bo);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;resize:vertical;min-height:68px;background:#fff;outline:none;}
textarea.nt::placeholder{color:#9bb3a3;}
.il{margin-top:8px;}
.ir{display:flex;gap:8px;margin-bottom:6px;align-items:center;}
.ir input{flex:1;border:1px solid var(--bo);border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;outline:none;background:#fff;}
.ir select{font-size:11px;font-weight:600;padding:6px 8px;border:1px solid var(--bo);border-radius:6px;cursor:pointer;outline:none;background:#fff;min-width:130px;}
.brm{background:none;border:none;color:#dc2626;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px;}
.brm:hover{background:#fee2e2;}
.bai{margin-top:6px;font-size:12px;color:var(--pl);background:none;border:1px dashed var(--ac);border-radius:6px;padding:6px 12px;cursor:pointer;width:100%;font-family:inherit;}
.bai:hover{background:#e8f5ed;}
.c1{background:#e8f5ed;} .c2{background:#fefce8;} .c3{background:#f0fdf4;}
.c4{background:#f5f3ff;} .c5{background:#fff7ed;} .c6{background:#e0f2fe;}
.fb{margin-top:20px;background:var(--ca);border-radius:14px;border:1px solid var(--bo);padding:16px 20px;}
.fb label{font-size:13px;font-weight:700;color:var(--p);display:block;margin-bottom:8px;}
.fb textarea{width:100%;border:1px solid var(--bo);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical;min-height:80px;outline:none;}
#ov{display:none;position:fixed;inset:0;background:rgba(26,71,49,.55);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#ov.sh{display:flex;}
#ov p{color:#fff;font-size:15px;font-weight:600;}
.sp{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media print{.ha,.bai,.brm,#ov{display:none!important;}.sb{max-height:none!important;padding:18px!important;overflow:visible!important;}.mn{padding:0;max-width:100%;}body{background:#fff;}}
</style>
</head>

           {id:'v3',lbl:'Pendientes por atender',ph:'Compromisos con constructora...'},
           {id:'v4',lbl:'Proceso de entrega / postventa',ph:'Estado entregas, reclamaciones...'}],
     items:true,iLbl:'Tareas eventuales',iPh:'Tarea - responsable - estado...'},
    ASEO,CART,
    {id:'s5p',ico:'&#128202;',cls:'c5',tit:'Presupuesto y Auditoria Contable',sub2:'Control financiero y auditoria',
     subs:[{id:'b1',lbl:'Ejecucion presupuestal',ph:'Ingresos vs presupuesto, gastos...'},
           {id:'b2',lbl:'Estado de cuentas / conciliacion',ph:'Saldos, conciliaciones bancarias...'},
           {id:'b3',lbl:'Gestion auditoria contable',ph:'Avance auditoria, hallazgos...'},
           {id:'b4',lbl:'Compromisos financieros',ph:'Pagos por realizar, obligaciones...'}],
     items:true,iLbl:'Conceptos destacados',iPh:'Concepto - valor - estado...'},
    RECC]
};

var DATA={tipo:'definitiva',conj:'',coor:'',fech:'',per:'',obs:'',secs:{}};

function gSecs(){return SECS[DATA.tipo]||SECS.definitiva;}

function gSD(id){
  if(!DATA.secs[id])DATA.secs[id]={open:false,st:'na',subs:{},items:[]};
  return DATA.secs[id];
}

function topSt(sec){
  var sd=gSD(sec.id);
  if(sd.st&&sd.st!='na')return sd.st;
  var pri=['critical','alert','warn','ok','na'],best='na';
  Object.values(sd.subs).forEach(function(s){if(pri.indexOf(s.st)<pri.indexOf(best))best=s.st;});
  return best;
}

function render(){
  drawDash();
  drawSecs();
  syncInputs();
}

function syncInputs(){
  document.getElementById('iConj').value=DATA.conj||'';
  document.getElementById('iCoor').value=DATA.coor||'';
  document.getElementById('iFech').value=DATA.fech||'';
  document.getElementById('iPer').value=DATA.per||'';
  document.getElementById('iObs').value=DATA.obs||'';
  document.getElementById('bDef').classList.toggle('on',DATA.tipo=='definitiva');
  document.getElementById('bPro').classList.toggle('on',DATA.tipo=='provisional');
}

function drawDash(){
  var d=document.getElementById('dash');
  d.innerHTML='';
  gSecs().forEach(function(sec){
    var st=topSt(sec);
    var el=document.createElement('div');
    el.className='dc '+st;
    el.innerHTML='<div class="ic">'+sec.ico+'</div><div class="lb">'+sec.tit+'</div><div class="sd"></div>';
    el.addEventListener('click',function(){openSec(sec.id);});
    d.appendChild(el);
  });
}

function drawSecs(){
  var g=document.getElementById('grid');
  g.innerHTML='';
  gSecs().forEach(function(sec,n){
    var sd=gSD(sec.id);
    var st=topSt(sec);
    // Card
    var card=document.createElement('div');
    card.className='sc';
    card.id='card-'+sec.id;
    // Header
    var hdr=document.createElement('div');
    hdr.className='sh';
    // Number
    var num=document.createElement('div');
    num.className='sn';num.textContent=n+1;
    // Icon
    var ico=document.createElement('div');
    ico.className='si '+sec.cls;ico.innerHTML=sec.ico;
    // Title wrap
    var tw=document.createElement('div');tw.className='sw';
    var t1=document.createElement('div');t1.className='st';t1.textContent=sec.tit;
    var t2=document.createElement('div');t2.className='ss';t2.textContent=sec.sub2;
    tw.appendChild(t1);tw.appendChild(t2);
    // Badge
    var bdg=document.createElement('button');
    bdg.className='badge '+st;
    bdg.innerHTML=slbl(st);
    bdg.id='badge-'+sec.id;
    // Chevron
    var chv=document.createElement('span');
    chv.className='cv'+(sd.open?' op':'');
    chv.innerHTML='&#9658;';
    hdr.appendChild(num);hdr.appendChild(ico);hdr.appendChild(tw);hdr.appendChild(bdg);hdr.appendChild(chv);
    // Toggle on header click
    hdr.addEventListener('click',function(){toggleSec(sec.id);});
    // Badge cycles status (stop propagation)
    bdg.addEventListener('click',function(e){e.stopPropagation();cycleSt(sec.id);});
    card.appendChild(hdr);
    // Body
    var body=document.createElement('div');
    body.className='sb'+(sd.open?' op':'');
    body.id='body-'+sec.id;
    // Sub-items
    var sui=document.createElement('div');sui.className='sui';
    sec.subs.forEach(function(sub){
      var sv=(sd.subs&&sd.subs[sub.id])||{};
      var suEl=document.createElement('div');suEl.className='su';
      // Sub header
      var suh=document.createElement('div');suh.className='suh';
      var sutEl=document.createElement('span');sutEl.className='sut';sutEl.innerHTML='&#128204; '+sub.lbl;
      var sel=document.createElement('select');sel.className='ss2 '+(sv.st||'na');
      ST.forEach(function(s){
        var o=document.createElement('option');
        o.value=s;o.innerHTML=slbl(s);
        if((sv.st||'na')==s)o.selected=true;
        sel.appendChild(o);
      });
      sel.addEventListener('change',function(){
        var sdd=gSD(sec.id);
        if(!sdd.subs[sub.id])sdd.subs[sub.id]={};
        sdd.subs[sub.id].st=sel.value;
        sel.className='ss2 '+sel.value;
        drawDash();save();
      });
      suh.appendChild(sutEl);suh.appendChild(sel);
      // Textarea
      var ta=document.createElement('textarea');
      ta.className='nt';ta.placeholder=sub.ph;ta.value=sv.notes||'';ta.spellcheck=true;ta.lang='es';
      ta.addEventListener('input',function(){
        var sdd=gSD(sec.id);
        if(!sdd.subs[sub.id])sdd.subs[sub.id]={};
        sdd.subs[sub.id].notes=ta.value;save();
      });
      suEl.appendChild(suh);suEl.appendChild(ta);sui.appendChild(suEl);
    });
    body.appendChild(sui);
    // Items
    if(sec.items){
      var ibox=document.createElement('div');ibox.className='su';ibox.style.marginTop='12px';
      var ihdr=document.createElement('div');ihdr.className='suh';
      var itit=document.createElement('span');itit.className='sut';itit.innerHTML='&#128203; '+(sec.iLbl||'Items');
      ihdr.appendChild(itit);ibox.appendChild(ihdr);
      var ilist=document.createElement('div');ilist.className='il';ilist.id='il-'+sec.id;
      var items=sd.items||[];
      items.forEach(function(it,i){ilist.appendChild(makeRow(sec,i,it));});
      ibox.appendChild(ilist);
      var badd=document.createElement('button');badd.className='bai';badd.textContent='+ Agregar item';
      badd.addEventListener('click',function(){addItem(sec.id);});
      ibox.appendChild(badd);body.appendChild(ibox);
    }
    card.appendChild(body);g.appendChild(card);
  });
}

function makeRow(sec,idx,it){
  var row=document.createElement('div');row.className='ir';
  var inp=document.createElement('input');
  inp.type='text';inp.placeholder=sec.iPh||'Descripcion...';inp.value=it.text||'';inp.spellcheck=true;inp.lang='es';
  inp.addEventListener('input',function(){var sd=gSD(sec.id);sd.items[idx].text=inp.value;save();});
  var sel=document.createElement('select');
  ST.forEach(function(s){
    var o=document.createElement('option');o.value=s;o.innerHTML=slbl(s);
    if((it.st||'na')==s)o.selected=true;sel.appendChild(o);
  });
  sel.addEventListener('change',function(){var sd=gSD(sec.id);sd.items[idx].st=sel.value;save();});
  var brm=document.createElement('button');brm.className='brm';brm.innerHTML='&#10005;';
  brm.addEventListener('click',function(){rmItem(sec.id,idx);});
  row.appendChild(inp);row.appendChild(sel);row.appendChild(brm);
  return row;
}

function toggleSec(id){
  var sd=gSD(id);sd.open=!sd.open;
  var body=document.getElementById('body-'+id);
  var card=document.getElementById('card-'+id);
  if(body)body.classList.toggle('op',sd.open);
  if(card){var cv=card.querySelector('.cv');if(cv)cv.classList.toggle('op',sd.open);}
  drawDash();save();
}

function openSec(id){
  var sd=gSD(id);sd.open=true;
  var body=document.getElementById('body-'+id);
  var card=document.getElementById('card-'+id);
  if(body)body.classList.add('op');
  if(card){var cv=card.querySelector('.cv');if(cv)cv.classList.add('op');}
  drawDash();save();
}

function cycleSt(id){
  var sd=gSD(id),cyc=['na','ok','warn','alert','critical'];
  sd.st=cyc[(cyc.indexOf(sd.st||'na')+1)%cyc.length];
  // Auto-collapse cuando se marca Al dia
  if(sd.st==='ok'){
    sd.open=false;
    var body=document.getElementById('body-'+id);
    var card=document.getElementById('card-'+id);
    if(body)body.classList.remove('op');
    if(card){var cv=card.querySelector('.cv');if(cv)cv.classList.remove('op');}
  }
  drawDash();
  var b=document.getElementById('badge-'+id);
  if(b){b.className='badge '+sd.st;b.innerHTML=slbl(sd.st);}
  save();
}

function addItem(sid){
  var sd=gSD(sid);if(!sd.items)sd.items=[];
  sd.items.push({text:'',st:'na'});
  var sec=gSecs().find(function(s){return s.id==sid;});
  var list=document.getElementById('il-'+sid);
  if(list&&sec)list.appendChild(makeRow(sec,sd.items.length-1,sd.items[sd.items.length-1]));
  save();
}

function rmItem(sid,idx){
  var sd=gSD(sid);sd.items.splice(idx,1);
  var sec=gSecs().find(function(s){return s.id==sid;});
  var list=document.getElementById('il-'+sid);
  if(list&&sec){
    list.innerHTML='';
    sd.items.forEach(function(it,i){list.appendChild(makeRow(sec,i,it));});
  }
  save();
}

function setTipo(t){
  DATA.tipo=t;
  document.getElementById('bDef').classList.toggle('on',t=='definitiva');
  document.getElementById('bPro').classList.toggle('on',t=='provisional');
  render();save();
}

function getMeta(){
  DATA.conj=document.getElementById('iConj').value;
  DATA.coor=document.getElementById('iCoor').value;
  DATA.fech=document.getElementById('iFech').value;
  DATA.per=document.getElementById('iPer').value;
  DATA.obs=document.getElementById('iObs').value;
}

var _t;
function save(){
  getMeta();clearTimeout(_t);
  _t=setTimeout(function(){try{localStorage.setItem('vp4',JSON.stringify(DATA));}catch(e){}},300);
}

function load(){
  try{var s=localStorage.getItem('vp4');if(s){var d=JSON.parse(s);Object.assign(DATA,d);}}catch(e){}
  if(DATA.tipo=='regular')DATA.tipo='definitiva';
  if(!SECS[DATA.tipo])DATA.tipo='definitiva';
}

function limpiar(){
  if(!confirm('Limpiar todo el informe?'))return;
  DATA={tipo:DATA.tipo,conj:'',coor:'',fech:'',per:'',obs:'',secs:{}};
  try{localStorage.removeItem('vp4');}catch(e){}render();
}

function exportJSON(){
  getMeta();
  var b=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='informe_'+(DATA.conj||'conjunto')+'_'+(DATA.fech||'hoy')+'.json';a.click();
}

async function exportPDF(){
  getMeta();
  // En PDF: abrir solo secciones con novedades, cerrar las "Al dia"
  var was={};
  gSecs().forEach(function(sec){
    var sd=gSD(sec.id);was[sec.id]=sd.open;
    var st=topSt(sec);
    var abrir=(st!=='ok'&&st!=='na');
    sd.open=abrir;
    var b=document.getElementById('body-'+sec.id);
    var c=document.getElementById('card-'+sec.id);
    if(b)b.classList.toggle('op',abrir);
    if(c){var cv=c.querySelector('.cv');if(cv)cv.classList.toggle('op',abrir);}
  });
  // Ocultar subsecciones "Al dia" dentro de secciones abiertas
  var hiddenSubs=[];
  document.querySelectorAll('.sb.op .su').forEach(function(su){
    var sel=su.querySelector('select.ss2');
    if(sel&&sel.value==='ok'){su.style.display='none';hiddenSubs.push(su);}
  });
  document.getElementById('ov').classList.add('sh');
  document.getElementById('bpdf').disabled=true;
  document.querySelectorAll('.bai,.brm').forEach(function(e){e.style.display='none';});
  try{
    await html2pdf().set({
      margin:[10,10,12,10],
      filename:'informe_'+(DATA.conj||'conjunto')+'_'+(DATA.fech||'hoy')+'.pdf',
      image:{type:'jpeg',quality:.95},
      html2canvas:{scale:2,useCORS:true,logging:false},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    }).from(document.getElementById('main')).save();
  }catch(e){alert('Error PDF. Usa Ctrl+P y guarda como PDF.');}
  document.querySelectorAll('.bai,.brm').forEach(function(e){e.style.display='';});
  hiddenSubs.forEach(function(su){su.style.display='';});
  document.getElementById('ov').classList.remove('sh');
  document.getElementById('bpdf').disabled=false;
  gSecs().forEach(function(sec){
    var sd=gSD(sec.id);sd.open=was[sec.id];
    var b=document.getElementById('body-'+sec.id);if(b)b.classList.toggle('op',sd.open);
    var c=document.getElementById('card-'+sec.id);if(c){var cv=c.querySelector('.cv');if(cv)cv.classList.toggle('op',sd.open);}
  });
}

window.onload=function(){
  document.getElementById('iFech').value=new Date().toISOString().split('T')[0];
  load();
  render();
};
</script>
