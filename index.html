<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe de Coordinación – Victoria Pineda Administraciones</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --primary:       #1b5e38;
    --primary-mid:   #236b42;
    --primary-light: #2e7d52;
    --accent:        #4caf76;
    --accent-soft:   #a8d5b8;
    --green-ok:      #16a34a;
    --yellow:        #ca8a04;
    --orange:        #ea580c;
    --red:           #dc2626;
    --gray:          #6b7280;
    --bg:            #f0f7f3;
    --card:          #ffffff;
    --border:        #c6ddd0;
    --text:          #1a2e23;
    --text-soft:     #4a6b56;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .app-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: #fff;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px 12px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Logo container */
  .logo-wrap {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.95);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.3);
  }

  .logo-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
  }

  .logo-placeholder {
    font-size: 10px;
    color: var(--primary);
    text-align: center;
    font-weight: 700;
    line-height: 1.2;
    padding: 4px;
    letter-spacing: 0.3px;
  }

  .brand-text h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.3px; }
  .brand-text p  { font-size: 11px; opacity: 0.75; margin-top: 2px; }

  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn-header {
    background: rgba(255,255,255,0.13);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-header:hover { background: rgba(255,255,255,0.22); }
  .btn-header.accent { background: var(--accent); border-color: var(--accent); }
  .btn-header.accent:hover { background: #3d9e66; }
  .btn-header:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ── META BAR ── */
  .meta-bar {
    background: rgba(0,0,0,0.2);
    padding: 10px 24px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .meta-field { display: flex; flex-direction: column; gap: 3px; }
  .meta-field label { opacity: 0.7; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; }
  .meta-field input, .meta-field select {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  .meta-field input::placeholder { color: rgba(255,255,255,0.45); }
  .meta-field select option { background: var(--primary); }

  .type-toggle {
    display: flex;
    gap: 4px;
    background: rgba(0,0,0,0.22);
    border-radius: 8px;
    padding: 4px;
  }
  .type-btn {
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    color: rgba(255,255,255,0.65);
    background: transparent;
    transition: all 0.15s;
  }
  .type-btn.active { background: #fff; color: var(--primary); }

  /* ── MAIN ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  /* ── DASHBOARD ── */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
    gap: 10px;
    margin-bottom: 22px;
  }

  .dash-card {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 12px;
    border: 1px solid var(--border);
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .dash-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(26,71,49,0.12); }
  .dash-card .icon { font-size: 22px; margin-bottom: 5px; }
  .dash-card .label { font-size: 11px; color: var(--text-soft); font-weight: 600; line-height: 1.3; }
  .dash-card .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin: 7px auto 0;
    background: #d1d5db;
  }
  .dash-card.ok       .status-dot { background: var(--green-ok); }
  .dash-card.warn     .status-dot { background: var(--yellow); }
  .dash-card.alert    .status-dot { background: var(--orange); }
  .dash-card.critical .status-dot { background: var(--red); }

  /* ── SECTION CARDS ── */
  .section-grid { display: flex; flex-direction: column; gap: 14px; }

  .section-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .section-card:hover { box-shadow: 0 2px 14px rgba(26,71,49,0.09); }

  .section-header {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    gap: 12px;
    background: #f4faf6;
    border-bottom: 1px solid var(--border);
  }

  .section-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .section-num {
    font-size: 11px;
    font-weight: 800;
    color: var(--primary);
    background: var(--accent-soft);
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .section-title-wrap { flex: 1; min-width: 0; }
  .section-title { font-size: 15px; font-weight: 700; color: var(--primary); }
  .section-subtitle { font-size: 11px; color: var(--text-soft); margin-top: 1px; }

  .section-status-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .badge-ok       { background: #dcfce7; color: #15803d; }
  .badge-warn     { background: #fef9c3; color: #a16207; }
  .badge-alert    { background: #ffedd5; color: #c2410c; }
  .badge-critical { background: #fee2e2; color: #b91c1c; }
  .badge-na       { background: #f1f5f9; color: #64748b; }

  .chevron { font-size: 11px; color: var(--text-soft); transition: transform 0.2s; margin-left: 4px; }
  .chevron.open { transform: rotate(90deg); }

  .section-body { padding: 18px; display: none; }
  .section-body.open { display: block; }

  /* ── SUB-ITEMS ── */
  .sub-items { display: flex; flex-direction: column; gap: 12px; }

  .sub-item {
    background: #f4faf6;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px;
  }

  .sub-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .sub-item-title { font-size: 13px; font-weight: 600; flex: 1; color: var(--primary); }

  .status-select {
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 6px;
    border: none; cursor: pointer; outline: none;
  }
  .status-select.ok       { background: #dcfce7; color: #15803d; }
  .status-select.warn     { background: #fef9c3; color: #a16207; }
  .status-select.alert    { background: #ffedd5; color: #c2410c; }
  .status-select.critical { background: #fee2e2; color: #b91c1c; }
  .status-select.na       { background: #f1f5f9; color: #64748b; }

  textarea.notes {
    width: 100%; border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 11px;
    font-size: 13px; font-family: inherit;
    resize: vertical; min-height: 68px;
    background: #fff; color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  textarea.notes:focus { border-color: var(--primary-light); }
  textarea.notes::placeholder { color: #9bb3a3; }

  /* ── ITEM ROWS ── */
  .items-list { margin-top: 8px; }

  .item-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .item-row input {
    flex: 1; border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px;
    font-size: 12px; font-family: inherit;
    outline: none; background: #fff;
  }
  .item-row input:focus { border-color: var(--primary-light); }
  .item-row select {
    font-size: 11px; font-weight: 600;
    padding: 6px 8px; border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; outline: none;
    background: #fff; min-width: 110px;
  }
  .btn-remove {
    background: none; border: none; color: #dc2626;
    cursor: pointer; font-size: 16px;
    padding: 2px 6px; border-radius: 4px; line-height: 1;
  }
  .btn-remove:hover { background: #fee2e2; }

  .btn-add-item {
    margin-top: 6px; font-size: 12px;
    color: var(--primary-light);
    background: none; border: 1px dashed var(--accent);
    border-radius: 6px; padding: 6px 12px;
    cursor: pointer; width: 100%; transition: background 0.15s;
    font-family: inherit;
  }
  .btn-add-item:hover { background: #e8f5ed; }

  /* ── SECTION COLORS ── */
  .ic-1 { background: #e8f5ed; }
  .ic-2 { background: #fefce8; }
  .ic-3 { background: #f0fdf4; }
  .ic-4 { background: #f5f3ff; }
  .ic-5 { background: #fff7ed; }
  .ic-6 { background: #e0f2fe; }

  /* ── OBSERVACIONES FOOTER ── */
  .footer-bar {
    margin-top: 20px;
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 16px 20px;
  }
  .footer-bar label { font-size: 13px; font-weight: 700; color: var(--primary); display: block; margin-bottom: 8px; }
  .footer-bar textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    outline: none;
    color: var(--text);
  }
  .footer-bar textarea:focus { border-color: var(--primary-light); }

  /* ── PDF OVERLAY ── */
  #pdfOverlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,71,49,0.55);
    z-index: 9999;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
  }
  #pdfOverlay.show { display: flex; }
  #pdfOverlay p { color: #fff; font-size: 15px; font-weight: 600; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PRINT / PDF STYLES ── */
  @media print {
    .app-header .header-actions, .btn-add-item, .btn-remove, #pdfOverlay { display: none !important; }
    .section-body { display: block !important; }
    .main { padding: 0; max-width: 100%; }
    body { background: #fff; }
    .section-card { break-inside: avoid; margin-bottom: 10px; }
    .meta-field input, .meta-field select { color: #fff; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .header-top { flex-direction: column; align-items: flex-start; }
    .meta-bar { gap: 10px; }
    .dashboard { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

  const dash = document.getElementById('dashboard');

  currentSections().forEach(sec => {
    const sd = getSectionData(sec.id);
    const topSt = getTopStatus(sec, sd);
    const card = document.createElement('div');
    card.className = `dash-card ${topSt}`;
    card.innerHTML = `<div class="icon">${sec.icon}</div>
      <div class="label">${sec.title}</div>
      <div class="status-dot"></div>`;
    card.onclick = () => toggleSection(sec.id, true);
    dash.appendChild(card);
  });
}
